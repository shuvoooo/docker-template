services:
  cadvisor:
    image: ghcr.io/google/cadvisor:${VERSION:-v0.53.0}
    privileged: true
    command:
      - --docker_only=true
      - --allow_dynamic_housekeeping=true
      - --housekeeping_interval=10s
      - --store_container_labels=false
    devices:
      - /dev/kmsg:/dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    restart: unless-stopped
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
